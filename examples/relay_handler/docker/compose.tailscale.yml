# Tailscale sidecar overlay (on top of compose.yml + compose.lan.yml) so the
# stack is reachable from a softphone on any network. The container brings up
# a real tailscale0 in the host netns, which the host-net kamailio/relay then
# advertise on. Run it via ./tailscale-lan.sh; details in README.md.
#
# Needs a kernel TUN device (/dev/net/tun); userspace mode wouldn't expose
# tailscale0 to the other containers, hence TS_USERSPACE=false.

services:
  tailscale:
    image: tailscale/tailscale:stable
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun
    environment:
      # Optional (default empty) so down/logs don't require it; tailscale-lan.sh
      # enforces it before starting the sidecar.
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_HOSTNAME: relay-handler
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - tailscale-state:/var/lib/tailscale

volumes:
  tailscale-state:
