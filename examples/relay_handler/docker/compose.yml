# End-to-end test rig for relay_handler. Four services on a shared docker
# network: Kamailio (signaling), relay_handler (Membrane RTP relay running
# in Elixir), and two SIPp endpoints (UAS + UAC).
#
# Why the relay runs in a container: on macOS / Colima the host can't route
# UDP back to container bridge IPs, so a host-run relay would receive RTP
# from peers but couldn't deliver it to the other side. Sharing the docker
# network sidesteps that.
#
# Usage (bridge mode — internal Docker E2E):
#   1. Bring up the long-running services:
#        docker compose up -d --build relay kamailio sink sipp-uas
#   2. Register user 1000 (one-shot) so Kamailio's lookup("location") works:
#        docker compose run --rm sipp-register
#   3. Place a call:
#        docker compose run --rm sipp-uac
#   4. Watch the relay's packet counters:
#        docker compose logs -f relay
#   5. Listen to what arrived at the receiving peer:
#        ffplay -f alaw -ar 8000 -ac 1 recordings/uas.alaw
#
# The Membrane relay also drops a per-direction recording into recordings/
# for every call it bridges (see RelayHandler.Pipeline moduledoc). Those are
# raw PCMU (μ-law), so play with:
#        ffplay -f mulaw -ar 8000 -ch_layout mono recordings/<call_id>__caller_to_callee.raw
# (For ffmpeg <8, `-ac 1` instead of `-ch_layout mono`.)
#
# For real-softphone calls on the LAN, layer compose.lan.yml on top —
# see that file's header for the prerequisites and commands.

services:
  relay:
    build:
      context: ../../..             # repo root of ex_kamailio
      dockerfile: examples/relay_handler/docker/relay/Dockerfile
    environment:
      # SDP address Kamailio rewrites peer media to. `relay` is the docker
      # service name; peers resolve it via docker DNS.
      MEDIA_IP: relay
    # Mounted so the per-call Tee+File.Sink branches of the Membrane pipeline
    # (RelayHandler.Pipeline) can write codec payloads here for inspection.
    volumes:
      - ./recordings:/recordings
    expose:
      - "4003/tcp"
      - "11000-11200/udp"
    # The Elixir app compiles + boots `mix run` at container start, so the
    # rtpengine control socket (Bandit on :4003) isn't up immediately. Mark
    # the relay healthy only once :4003 is LISTENing, so kamailio waits for
    # it (see depends_on below) instead of failing rtpengine_offer on the
    # first call. Checked via /proc/net/tcp to avoid adding tools to the
    # image: 4003 == 0x0FA3, and 0A == TCP LISTEN; a listening socket has
    # rem_address 00000000:0000.
    healthcheck:
      test: ["CMD-SHELL", "grep -q '0FA3 00000000:0000 0A' /proc/net/tcp"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 90s

  kamailio:
    build: ./kamailio
    # Wait until the relay's control socket is actually listening, not just
    # until its container has started — otherwise kamailio's first
    # rtpengine WebSocket connect races the relay's boot and the node gets
    # marked dead until the next ping/restart.
    depends_on:
      relay:
        condition: service_healthy
    expose:
      - "5060/udp"

  # Receives RTP from the relay and writes the depayloaded payload to a
  # file in ./recordings/. Use `ffplay -f alaw -ar 8000 -ac 1
  # recordings/uas.alaw` after a call to listen to what arrived.
  sink:
    build: ./sink
    environment:
      SINK_PORT: 6000
      SINK_OUTPUT: /recordings/uas.alaw
    volumes:
      - ./recordings:/recordings
    expose:
      - "6000/udp"

  sipp-uas:
    build: ../../echo_handler/docker/sipp
    volumes:
      - ./sipp/uas.xml:/scenarios/uas.xml:ro
    # Templates the SDP at startup so it advertises `sink`'s IP, then runs
    # sipp. We can't just pass `-mi sink_ip` to sipp because that flag is
    # used both for SDP advertising AND for binding the local RTP socket —
    # and the sink's IP isn't a local address on this container. Instead
    # we resolve it via docker DNS and sed it into the scenario.
    entrypoint: ["sh", "-c"]
    command:
      - |
        SINK_IP=$$(getent hosts sink | awk '{print $$1}')
        echo "[sipp-uas] templating media IP -> $$SINK_IP"
        sed "s/\[media_ip\]/$$SINK_IP/g" /scenarios/uas.xml > /tmp/uas.xml
        exec sipp -sf /tmp/uas.xml -p 5070 -mp 6000 -trace_msg -trace_screen
    depends_on:
      - sink
    expose:
      - "5070/udp"

  # One-shot REGISTER for user 1000. Run with `docker compose run --rm
  # sipp-register` after sipp-uas is up; this populates Kamailio's
  # location table so the UAC's INVITE has somewhere to be routed.
  sipp-register:
    build: ../../echo_handler/docker/sipp
    volumes:
      - ./sipp/register.xml:/scenarios/register.xml:ro
    command:
      [
        "sipp",
        "-sf", "/scenarios/register.xml",
        "kamailio:5060",
        "-m", "1",
        "-trace_msg", "-trace_screen",
      ]
    depends_on:
      - kamailio
      - sipp-uas

  sipp-uac:
    build: ../../echo_handler/docker/sipp
    volumes:
      - ./sipp/uac.xml:/scenarios/uac.xml:ro
      - ./sipp/tone.pcap:/scenarios/tone.pcap:ro
    command:
      [
        "sipp",
        "-sf", "/scenarios/uac.xml",
        "kamailio:5060",
        "-m", "1",
        "-mp", "6000",
      ]
    depends_on:
      - kamailio
      - sipp-uas
