# LAN-mode overlay: runs kamailio + relay on the host netns so real
# softphones (incl. a mobile) register and call through the stack.
# ADVERTISE_IP is the one knob — the address every peer uses to reach us
# (SIP advertise + SDP media IP). Setup/teardown and the ways to fill
# ADVERTISE_IP: see README.md "Reaching it from a real / mobile phone".

services:
  relay:
    network_mode: host
    environment:
      MEDIA_IP: ${ADVERTISE_IP:?set ADVERTISE_IP — run ./tailscale-lan.sh, or export it to your reachable LAN IP}

  kamailio:
    network_mode: host
    environment:
      # The cfg reads both from $env() at parse time — no templating needed.
      ADVERTISE_IP: ${ADVERTISE_IP:?set ADVERTISE_IP — run ./tailscale-lan.sh, or export it to your reachable LAN IP}
      RTPENGINE_SOCK: ws://127.0.0.1:4003
    # -A LAN_MODE selects the advertise/alias listen lines (and makes the cfg
    # consult ADVERTISE_IP); RTPENGINE_SOCK points rtpengine over loopback.
    command: ["kamailio", "-f", "/etc/kamailio/kamailio.cfg", "-DD", "-E", "-A", "LAN_MODE"]
