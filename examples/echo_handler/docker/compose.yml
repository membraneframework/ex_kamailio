# End-to-end test rig for ex_kamailio: real Kamailio (with lwsc + rtpengine
# modules) drives a one-shot SIP call between a SIPp UAC and UAS, while
# rtpengine-protocol commands flow over WebSocket to ex_kamailio running
# on the host (host.docker.internal:4003).
#
# Usage:
#   1. Start ex_kamailio + echo_handler on the host:
#        cd .. && iex -S mix     # listens on :4003
#   2. Spin up Kamailio + SIPp UAS:
#        docker compose up -d kamailio sipp-uas
#   3. Place the call:
#        docker compose run --rm sipp-uac
#   4. Tear down:
#        docker compose down

services:
  kamailio:
    build: ./kamailio
    # Use the bridge network so containers resolve each other by service name
    # and Kamailio can reach the host via host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "5060/udp"

  sipp-uas:
    build: ./sipp
    volumes:
      - ./sipp/uas.xml:/scenarios/uas.xml:ro
    # -p 5070: SIPp listens on UDP 5070. Kamailio's `$du` sends INVITE here.
    # -bg: not used; we want the process to stay in foreground for `up -d` logs.
    command: ["sipp", "-sf", "/scenarios/uas.xml", "-p", "5070", "-i", "0.0.0.0"]
    expose:
      - "5070/udp"

  sipp-uac:
    build: ./sipp
    volumes:
      - ./sipp/uac.xml:/scenarios/uac.xml:ro
    # Place one call at Kamailio:5060 and exit (-m 1 stops after 1 call).
    command: ["sipp", "-sf", "/scenarios/uac.xml", "kamailio:5060", "-m", "1", "-i", "0.0.0.0"]
    depends_on:
      - kamailio
      - sipp-uas
