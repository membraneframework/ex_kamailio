#!KAMAILIO

# --- Scope: deliberate omissions -------------------------------------------
# This is a minimal reference config: enough to demo ex_kamailio end to end,
# not a production deployment. Before relying on it beyond a trusted LAN,
# close these gaps (all standard Kamailio, left out to keep the file small):
#
#   * No REGISTER auth — this is an OPEN registrar: anyone reachable can bind
#     a contact and place calls. Real use needs digest auth (the `auth` +
#     `auth_db` modules, `www_authenticate()`/`auth_challenge()` in the
#     REGISTER route), which in turn needs a credentials DB (see next point).
#   * No persistence/HA — usrloc runs `db_mode=0` (in-memory), so all
#     registrations are lost on restart. Persisting them (and adding the auth
#     DB above) means a real backend: `db_mode=1/2/3` + `db_url` + a DB module
#     (`db_mysql`/`db_postgres`/`db_sqlite`) and the `location`/`subscriber`
#     tables. That DB dependency is exactly what this demo avoids.
#   * UDP only — no TCP/TLS listener and no WebSocket SIP transport. TCP is one
#     extra `listen=` line; TLS adds the `tls` module + certs; SIP-over-WS adds
#     the `websocket` module.
#   * No SIP-signaling NAT helper — media NAT is handled downstream (rtpengine
#     + the relay's latching), but there's no `nathelper`
#     (`fix_nated_register`/`fix_nated_contact`/`set_contact_alias`, rport).
#     Usually unnecessary with a public/relay address; needed if clients
#     register from behind NAT without one.

# Two integration points are read from the environment so this reference
# config runs unmodified across rigs. Both are expanded at parse time with
# `#!substdef` + `$env()`; `$env()` is provided by the pv module, which is
# therefore loaded before any `#!substdef` below.
#
#   RTPENGINE_SOCK  ng control socket of your ex_kamailio app, e.g.
#                   ws://relay:4003 (bridged, docker DNS) or
#                   ws://127.0.0.1:4003 (host netns / loopback).
#   ADVERTISE_IP    address peers use to reach us; consulted only under
#                   LAN_MODE (see the listen block).
loadmodule "pv.so"

# Listen on UDP/5060 on every interface inside the container.
#
# LAN mode binds 0.0.0.0, so `advertise` is needed or record_route() stamps
# sip:0.0.0.0 and in-dialog BYE/ACK can't route back. `alias` marks the
# advertise IP as ourselves (uri==myself) for the GRUU case below. Pass
# `-A LAN_MODE` to take this branch and set ADVERTISE_IP in the environment.
#!ifdef LAN_MODE
#!substdef "!ADVERTISE_IP!$env(ADVERTISE_IP)!"
listen=udp:0.0.0.0:5060 advertise ADVERTISE_IP:5060
alias=ADVERTISE_IP
#!else
listen=udp:0.0.0.0:5060
#!endif

# --- modules ---------------------------------------------------------------
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "lwsc.so"
loadmodule "rtpengine.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"

modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)
modparam("rr", "enable_full_lr", 1)
modparam("lwsc", "verbosity", 1)

# In-memory location table — no DB. Registrations are lost when Kamailio
# restarts, which is fine for the LAN demo: peers refresh on their own.
modparam("usrloc", "db_mode", 0)

# rtpengine module talks to your ex_kamailio app over its ng WebSocket. The
# socket URL is taken from the RTPENGINE_SOCK environment variable (see the
# header) — e.g. ws://relay:4003 over docker DNS in the bridged rig, or
# ws://127.0.0.1:4003 over loopback when kamailio shares the relay's netns.
#!substdef "!RTPENGINE_SOCK!$env(RTPENGINE_SOCK)!"
modparam("rtpengine", "rtpengine_sock", "RTPENGINE_SOCK")
modparam("rtpengine", "wsapi", "lwsc")

# --- routing ---------------------------------------------------------------
request_route {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (has_totag()) {
        if (loose_route()) {
            if (is_method("BYE|CANCEL")) {
                rtpengine_delete();
            }
            # GRUU/proxy Contacts (e.g. Linphone desktop) leave the in-dialog
            # R-URI pointing at us; re-resolve to the real binding so the
            # BYE/ACK reaches the callee instead of looping on localhost.
            if (uri==myself) {
                lookup("location");
            }
            route(RELAY);
        }
        exit;
    }

    if (is_method("REGISTER")) {
        xlog("L_INFO", "REGISTER from $si:$sp for $tu\n");
        if (!save("location")) {
            sl_reply_error();
        }
        exit;
    }

    if (is_method("INVITE")) {
        xlog("L_INFO", "INVITE from $si:$sp to $rU\n");

        # Route by registered contact instead of a hardcoded destination.
        if (!lookup("location")) {
            xlog("L_INFO", "user $rU not registered\n");
            sl_send_reply("404", "Not Found");
            exit;
        }

        t_newtran();
        t_on_reply("MANAGE_REPLY");

        if (has_body("application/sdp")) {
            $var(flags) = "replace-origin replace-session-connection";
            if (!rtpengine_offer($var(flags))) {
                xlog("L_ERR", "rtpengine_offer failed\n");
                sl_send_reply("488", "Not Acceptable Here");
                exit;
            }
        }

        record_route();
        route(RELAY);
        exit;
    }

    if (is_method("ACK|BYE|CANCEL|INFO|PRACK|UPDATE|REFER|OPTIONS")) {
        route(RELAY);
        exit;
    }

    sl_send_reply("405", "Method Not Allowed");
    exit;
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route[MANAGE_REPLY] {
    if (t_check_status("180|183|200") && has_body("application/sdp")) {
        $var(answer_flags) = "replace-origin replace-session-connection";
        if (!rtpengine_answer($var(answer_flags))) {
            xlog("L_ERR", "rtpengine_answer failed\n");
        }
    }
}
