#!KAMAILIO

# --- Reference config ------------------------------------------------------
# Minimal Kamailio config that drives a full call through ex_kamailio. Things
# that are not implemented you might want to add in a real deployment:
#
#   * REGISTER auth — this registrar is open; anyone reachable can bind a
#     contact. Add digest auth (`auth`/`auth_db` + a credentials DB).
#   * Persistent location — usrloc is `db_mode=0` (in-memory, lost on
#     restart). A DB backend also backs the auth DB above.
#   * Transports beyond UDP — a `listen=` line for TCP, the `tls` module for
#     TLS, or the `websocket` module for SIP-over-WS.
#   * NAT signaling help — the `nathelper` module, for NATed registrations.

# Two values are read from the environment (via `#!substdef` + `$env()`):
#
#   RTPENGINE_SOCK  ng control socket of your ex_kamailio app, e.g.
#                   ws://relay:4003 (bridged, docker DNS) or
#                   ws://127.0.0.1:4003 (host netns / loopback).
#   ADVERTISE_IP    address peers use to reach us; only used under PUBLIC_MODE.
#
# pv provides `$env()`, so it loads before any `#!substdef` below.
loadmodule "pv.so"

# Binding 0.0.0.0 needs `advertise`, else record_route() stamps sip:0.0.0.0
# and in-dialog BYE/ACK can't route back. `alias` makes that IP `uri==myself`
# for the GRUU re-resolve below.
#!ifdef PUBLIC_MODE
#!substdef "!ADVERTISE_IP!$env(ADVERTISE_IP)!"
listen=udp:0.0.0.0:5060 advertise ADVERTISE_IP:5060
alias=ADVERTISE_IP
#!else
listen=udp:0.0.0.0:5060
#!endif

# --- modules ---------------------------------------------------------------
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "lwsc.so"
loadmodule "rtpengine.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"

modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)
modparam("rr", "enable_full_lr", 1)
modparam("lwsc", "verbosity", 1)

modparam("usrloc", "db_mode", 0)

#!substdef "!RTPENGINE_SOCK!$env(RTPENGINE_SOCK)!"
modparam("rtpengine", "rtpengine_sock", "RTPENGINE_SOCK")
modparam("rtpengine", "wsapi", "lwsc")

# --- routing ---------------------------------------------------------------
request_route {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (has_totag()) {
        if (loose_route()) {
            if (is_method("BYE|CANCEL")) {
                rtpengine_delete();
            }
            # Some GRUU/proxy Contacts leave the in-dialog R-URI pointing at
            # us; re-resolve to the real binding so the BYE/ACK reaches the
            # callee instead of looping on localhost.
            if (uri==myself) {
                lookup("location");
            }
            route(RELAY);
        }
        exit;
    }

    if (is_method("REGISTER")) {
        xlog("L_INFO", "REGISTER from $si:$sp for $tu\n");
        if (!save("location")) {
            sl_reply_error();
        }
        exit;
    }

    if (is_method("INVITE")) {
        xlog("L_INFO", "INVITE from $si:$sp to $rU\n");

        if (!lookup("location")) {
            xlog("L_INFO", "user $rU not registered\n");
            sl_send_reply("404", "Not Found");
            exit;
        }

        t_newtran();
        t_on_reply("MANAGE_REPLY");

        if (has_body("application/sdp")) {
            $var(flags) = "replace-origin replace-session-connection";
            if (!rtpengine_offer($var(flags))) {
                xlog("L_ERR", "rtpengine_offer failed\n");
                sl_send_reply("488", "Not Acceptable Here");
                exit;
            }
        }

        record_route();
        route(RELAY);
        exit;
    }

    if (is_method("ACK|BYE|CANCEL|INFO|PRACK|UPDATE|REFER|OPTIONS")) {
        route(RELAY);
        exit;
    }

    sl_send_reply("405", "Method Not Allowed");
    exit;
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route[MANAGE_REPLY] {
    if (t_check_status("180|183|200") && has_body("application/sdp")) {
        $var(answer_flags) = "replace-origin replace-session-connection";
        if (!rtpengine_answer($var(answer_flags))) {
            xlog("L_ERR", "rtpengine_answer failed\n");
        }
    }
}
